{% extends 'base.html' %}

{% block title %}Supprimer un billet | LITReview{% endblock %}

{% block content %}
<section class="card card-narrow" aria-labelledby="delete-heading">
    <p class="eyebrow">Confirmation</p>
    <h1 id="delete-heading">Supprimer ce billet ?</h1>
    <p>Le billet « {{ ticket.title }} » et ses critiques seront définitivement supprimés.</p>
    <form method="post">
        {% csrf_token %}
        <div class="button-row">
            <a class="button button-secondary" href="{% url 'home' %}">Annuler</a>
            <button class="button button-danger" type="submit">Confirmer la suppression</button>
        </div>
    </form>
</section>
{% endblock %}
