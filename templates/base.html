{% load static %}
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LITReview{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <a class="skip-link" href="#main-content">Aller au contenu principal</a>
    <header class="site-header">
        <a class="brand" href="{% url 'login' %}" title="Retour à l'accueil LITReview">
            LIT<span>Review</span>
        </a>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="link-button" type="submit">Se déconnecter</button>
            </form>
        {% endif %}
    </header>
    <main id="main-content" class="page-container" tabindex="-1">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
